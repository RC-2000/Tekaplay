services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tekaplay
      POSTGRES_PASSWORD: tekaplay
      POSTGRES_DB: tekaplay
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tekaplay"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tekaplay:tekaplay@db:5432/tekaplay
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tekaplay:tekaplay@db:5432/tekaplay
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: celery -A app.workers.celery_app.celery worker --loglevel=INFO

  web:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
