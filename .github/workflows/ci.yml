name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: questforge
          POSTGRES_PASSWORD: questforge
          POSTGRES_DB: questforge_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U questforge"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: ruff check app tests
      - name: Type check
        working-directory: backend
        run: mypy app || true   # advisory until module surface stabilizes; flip to hard-fail in slice 2
      - name: Migration check (upgrade + downgrade + upgrade)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://questforge:questforge@localhost:5432/questforge_test
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://questforge:questforge@localhost:5432/questforge_test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type check
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t questforge-api ./backend
      - name: Build frontend image
        run: docker build -t questforge-web ./frontend

  # Deploy jobs (staging → smoke tests → manual approval → production) are added
  # in the infrastructure slice once hosting targets are provisioned.
